# بعد أول: fly launch --no-deploy
# غيّر اسم التطبيق app لو طلب Fly اسمًا آخر، أو عدّل primary_region للأقرب لك (ams / fra / cdg).

app = "mazr3a-backend"
primary_region = "ams"

[env]
  PORT = "8080"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "npx prisma migrate deploy"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
