services:
  postgres:
    image: postgres:16-alpine
    container_name: poultry-erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: poultry_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d poultry_erp"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
